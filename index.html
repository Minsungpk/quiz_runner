<!doctype html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Runner</title>

<link rel="stylesheet" href="./style.css">

<style>

.menuPage{
margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
background-image:url("./BCIT-background.png");
background-size:cover;
background-position:center;
}

/* dark overlay */

.menuPage::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.45);
}

/* main container */

.menuContainer{

position:relative;
text-align:center;
padding:50px 60px;
border-radius:16px;

backdrop-filter:blur(10px);
background:rgba(10,14,26,0.65);
border:1px solid rgba(255,255,255,0.15);

}

.menuTitle{
font-size:56px;
font-weight:900;
color:white;
margin-bottom:40px;
letter-spacing:2px;
}

.menuBtn{

display:block;
width:260px;
margin:12px auto;
padding:14px;
font-size:18px;
font-weight:700;

border-radius:10px;
border:none;

cursor:pointer;

color:white;

transition:all 0.2s ease;

}

.startBtn{
background:#38bdf8;
}

.startBtn:hover{
background:#0ea5e9;
transform:scale(1.05);
}

.createBtn{
background:#22c55e;
}

.createBtn:hover{
background:#16a34a;
transform:scale(1.05);
}

/* popup overlay */

.popup{
position:fixed;
inset:0;

display:none;
align-items:center;
justify-content:center;

background:rgba(0,0,0,0.6);
}

/* popup card */

.popupCard{

background:rgba(10,14,26,0.95);

padding:40px;

border-radius:14px;

text-align:center;

border:1px solid rgba(255,255,255,0.15);
}

.popupTitle{
color:white;
font-size:26px;
margin-bottom:25px;
}

.popupBtn{

display:block;

width:240px;

margin:10px auto;

padding:12px;

font-size:16px;

border:none;

border-radius:8px;

cursor:pointer;

color:white;

}

.manualBtn{
background:#6366f1;
}

.aiBtn{
background:#f97316;
}

.cancelBtn{
background:#444;
}

.popupBtn:hover{
transform:scale(1.05);
}

</style>

</head>

<body class="menuPage">

<div class="menuContainer">

<h1 class="menuTitle">QUIZ RUNNER</h1>

<button class="menuBtn startBtn"
onclick="location.href='index.html'">
Start Game
</button>

<button class="menuBtn createBtn"
onclick="openPopup()">
Create Questions
</button>

</div>


<!-- POPUP MENU -->

<div id="modePopup" class="popup">

<div class="popupCard">

<div class="popupTitle">
Choose Question Creation Mode
</div>

<button class="popupBtn manualBtn"
onclick="location.href='manual.html'">
Manual Questions
</button>

<button class="popupBtn aiBtn"
onclick="location.href='ai.html'">
AI Generate Questions
</button>

<button class="popupBtn cancelBtn"
onclick="closePopup()">
Cancel
</button>

</div>

</div>


<script>

function openPopup(){
document.getElementById("modePopup").style.display="flex";
}

function closePopup(){
document.getElementById("modePopup").style.display="none";
}

</script>

</body>

</html>
